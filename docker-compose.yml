version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=local
      - APP_PROJECT_ID=ironmind-486909
      - GOOGLE_APPLICATION_CREDENTIALS=/home/appuser/.config/gcloud/application_default_credentials.json
    volumes:
      # Mount GCP credentials for Firestore/Secret Manager access
      - ~/.config/gcloud:/home/appuser/.config/gcloud:ro
    restart: unless-stopped

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
